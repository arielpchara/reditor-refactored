<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reditor</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: system-ui, sans-serif;
        background: #0f172a;
        color: #f1f5f9;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card {
        background: #1e293b;
        border-radius: 1rem;
        padding: 2.5rem;
        width: 400px;
        box-shadow: 0 25px 50px rgba(0,0,0,.5);
        text-align: center;
      }
      h1 { font-size: 2rem; color: #7dd3fc; margin-bottom: .75rem; }
      p  { color: #94a3b8; line-height: 1.6; }
      .badge {
        display: inline-block;
        margin-top: 1.5rem;
        padding: .35rem .9rem;
        border-radius: 999px;
        background: #0ea5e9;
        color: #fff;
        font-size: .8rem;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>⚡ Reditor</h1>
      <p>Edit files from your server in the browser.</p>
      <span class="badge" id="health">Check /health</span>
    </div>
    <script>
      document.getElementById('health').addEventListener('click', async () => {
        const res = await fetch('/health');
        const data = await res.json();
        alert(JSON.stringify(data));
      });
    </script>
  </body>
</html>
